<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="Rink Reads">
  <defs>
    <linearGradient id="rrIris" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FC4C02"/>
      <stop offset="100%" stop-color="#CF4520"/>
    </linearGradient>
  </defs>
  <!-- Puck face: dark outer ring + ice-white interior -->
  <circle cx="32" cy="35" r="26" fill="#041E42"/>
  <circle cx="32" cy="35" r="22" fill="#f8fafc"/>
  <!-- Iris -->
  <circle cx="32" cy="35" r="13" fill="url(#rrIris)"/>
  <!-- Pupil — offset up-right for eyes-up-and-forward gaze -->
  <circle cx="34" cy="33" r="5.5" fill="#041E42"/>
  <!-- Catch light -->
  <circle cx="35.4" cy="31.4" r="1.8" fill="#f8fafc" opacity="0.9"/>
  <!-- Motion swoosh / eyebrow -->
  <path d="M 12 14 Q 32 6 52 14" stroke="url(#rrIris)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
